services:
  extension:
    build:
      context: ./extension
    volumes:
      # Source (for watch mode)
      - ./extension/src:/app/src
      - ./extension/public:/app/public
      - ./extension/webpack:/app/webpack
      # Output lands on the host so you can load it in Chrome
      - ./extension/dist:/app/dist
    # Use `docker compose run extension npm run watch` for live rebuild
    profiles: ["build"]

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    volumes:
      # Source code (live reload)
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib
      - ./web/migrations:/app/migrations
      # Persist local D1 database across restarts
      - wrangler_data:/app/.wrangler
    environment:
      NODE_ENV: development

volumes:
  wrangler_data:
