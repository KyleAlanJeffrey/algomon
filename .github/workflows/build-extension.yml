name: Build Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Zip extension
        run: cd extension/dist && zip -r ../../algomon-extension.zip .

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Algomon Extension (latest build)
          body: |
            Latest build of the Algomon Chrome extension from the `dev` branch.

            **To install:** Download `algomon-extension.zip`, unzip it, then load it as an unpacked extension in `chrome://extensions` with Developer Mode enabled.
          files: algomon-extension.zip
          prerelease: true
          make_latest: true
